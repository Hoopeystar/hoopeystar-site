      let h = 2166136261;

      const answers = shuffledAnswers(seed);
      marked = new Set([12]);
      activeLines = new Set();
      blackoutActive = false;
      board.replaceChildren();
      let answerIndex = 0;

      for (let index = 0; index < 25; index++) {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "cell";
        cell.setAttribute("role", "gridcell");
        cell.dataset.index = index;

        if (index === 12) {
          cell.classList.add("free");
          cell.setAttribute("aria-label", "Free space, automatically marked");
          cell.setAttribute("aria-pressed", "true");
          cell.disabled = true;
          cell.innerHTML = '<span class="free-fallback" aria-hidden="true"><b>B</b>×<b>B</b></span><img class="free-logo" src="boozeducksquare.jpg" alt="" onload="this.previousElementSibling.hidden=true" onerror="this.hidden=true">';
        } else {
          const answer = answers[answerIndex++];
          cell.innerHTML = `<span>${escapeHtml(answer)}</span>`;
          cell.setAttribute("aria-label", answer);
          cell.setAttribute("aria-pressed", "false");
          cell.addEventListener("click", () => toggleCell(cell, index));
        }
        board.append(cell);
      }

      requestAnimationFrame(fitBoardText);
    }

    function fitBoardText() {
      board.querySelectorAll(`.cell:not(.free)`).forEach(cell => {
        const label = cell.querySelector(`span`);
        if (!label) return;

        label.style.fontSize = ``;
        const cellStyle = getComputedStyle(cell);
        const availableWidth = cell.clientWidth - parseFloat(cellStyle.paddingLeft) - parseFloat(cellStyle.paddingRight);
        const availableHeight = cell.clientHeight - parseFloat(cellStyle.paddingTop) - parseFloat(cellStyle.paddingBottom);
        let fontSize = parseFloat(cellStyle.fontSize);
        const minimumFontSize = 7;

        while ((label.scrollWidth > availableWidth || label.scrollHeight > availableHeight) && fontSize > minimumFontSize) {
          fontSize = Math.max(minimumFontSize, fontSize - .5);
          label.style.fontSize = `${fontSize}px`;
        }
      });
    }

    const boardResizeObserver = new ResizeObserver(() => requestAnimationFrame(fitBoardText));
    boardResizeObserver.observe(board);

    function escapeHtml(value) {
      const temp = document.createElement("div");
      temp.textContent = value;
      return temp.innerHTML;
    }

    function toggleCell(cell, index) {
      if (marked.has(index)) marked.delete(index); else marked.add(index);
      cell.classList.toggle("marked", marked.has(index));
      cell.setAttribute("aria-pressed", String(marked.has(index)));
      detectBingo();
    }

    function detectBingo() {
      const completeNow = new Set();
      winningLines.forEach((line, index) => {
        if (line.every(cell => marked.has(cell))) completeNow.add(index);
      });
      const newLines = [...completeNow].filter(line => !activeLines.has(line));
      const isBlackout = marked.size === 25;

      if (isBlackout && !blackoutActive) celebrate(true);
      else if (newLines.length) celebrate(false);

      activeLines = completeNow;
      blackoutActive = isBlackout;
    }

    function celebrate(isBlackout) {
      clearTimeout(celebrationTimer);
      celebration.className = `celebration ${isBlackout ? "blackout " : ""}active`;
      bingoText.textContent = isBlackout ? "BLACKOUT!" : "BINGO!";
      makeConfetti(isBlackout ? 280 : 65, isBlackout);
      playCelebrationSound(isBlackout);
      pulsePage(isBlackout ? 52 : 12);
      celebrationTimer = setTimeout(() => celebration.className = "celebration", isBlackout ? 6000 : 4000);
    }

    function makeConfetti(count, isBlackout = false) {
      confetti.replaceChildren();
      const celebrationDuration = isBlackout ? 6 : 4;
      const confettiDelayWindow = isBlackout ? 3 : 2;
      const colors = isBlackout
        ? ["#ff0000", "#0066ff", "#ffffff", "#ffd700", "#00d9ff", "#ff3cac"]
        : ["#ff0000", "#0066ff", "#ffffff"];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("i");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = `${isBlackout ? 5 + Math.random() * 10 : 5 + Math.random() * 5}px`;
        piece.style.height = `${isBlackout ? 8 + Math.random() * 18 : 10 + Math.random() * 8}px`;
        piece.style.borderRadius = i % 5 === 0 ? "50%" : i % 3 === 0 ? "2px" : "0";
        const pieceDelay = i === 0 ? 0 : Math.random() * confettiDelayWindow;
        piece.style.setProperty("--fall-time", `${celebrationDuration - pieceDelay}s`);
        piece.style.setProperty("--drift", `${isBlackout ? -180 + Math.random() * 360 : -90 + Math.random() * 180}px`);
        piece.style.setProperty("--spin", `${Math.random() * 360}deg`);
        piece.style.animationDelay = `${pieceDelay}s`;
        piece.style.animationTimingFunction = isBlackout ? "linear" : "cubic-bezier(.2,.55,.45,1)";
        confetti.append(piece);
      }

      const balloonColors = isBlackout
        ? ["#ff0000", "#0066ff", "#ffd700", "#ffffff", "#ff3cac"]
        : ["#ff0000", "#0066ff", "#ffffff"];
      const balloonCount = isBlackout ? 26 : 12;
      for (let i = 0; i < balloonCount; i++) {
        const balloon = document.createElement("i");
        balloon.className = "balloon";
        balloon.style.left = `${2 + Math.random() * 94}%`;
        balloon.style.setProperty("--balloon-color", balloonColors[Math.floor(Math.random() * balloonColors.length)]);
        balloon.style.setProperty("--balloon-size", `${isBlackout ? 34 + Math.random() * 42 : 28 + Math.random() * 28}px`);
        balloon.style.setProperty("--balloon-drift", `${-100 + Math.random() * 200}px`);
        const balloonDelay = i === 0 ? 0 : Math.random() * (isBlackout ? 2.5 : 1.7);
        balloon.style.setProperty("--balloon-time", `${celebrationDuration - balloonDelay}s`);
        balloon.style.animationDelay = `${balloonDelay}s`;
        confetti.append(balloon);
      }
    }

    function pulsePage(flashes) {
      let count = 0;
      const timer = setInterval(() => {
        document.body.classList.remove("flash-red", "flash-blue");
        document.body.classList.add(count % 2 ? "flash-blue" : "flash-red");
        if (++count >= flashes) {
          clearInterval(timer);
          document.body.classList.remove("flash-red", "flash-blue");
        }
      }, 110);
    }

    function playCelebrationSound(isBlackout) {
      if (muted) return;
      const sound = isBlackout ? blackoutSound : bingoSound;
      [bingoSound, blackoutSound].forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
      });
      sound.play().catch(() => playSirenFallback(isBlackout));
    }

    function playSirenFallback(isBlackout) {
      if (muted) return;
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      const duration = isBlackout ? 2.8 : 1.15;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = "sawtooth";
      oscillator.frequency.setValueAtTime(520, now);
      for (let t = .15; t < duration; t += .3) {
        oscillator.frequency.linearRampToValueAtTime(860, now + t);
        oscillator.frequency.linearRampToValueAtTime(520, now + t + .15);
      }
      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(.075, now + .04);
      gain.gain.setValueAtTime(.075, now + duration - .08);
      gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start(now); oscillator.stop(now + duration);
    }

    function generate() {
      renderBoard(newRandomSeed());
    }

    document.querySelector("#generateButton").addEventListener("click", generate);
    document.querySelector("#clearButton").addEventListener("click", () => {
      marked = new Set([12]); activeLines.clear(); blackoutActive = false;
      board.querySelectorAll(".cell.marked").forEach(cell => {
        cell.classList.remove("marked"); cell.setAttribute("aria-pressed", "false");
      });
    });
    function setVolume(value) {
      const volume = Number(value) / 100;
      muted = volume === 0;
      bingoSound.volume = volume;
      blackoutSound.volume = volume;
      volumeValue.value = value;
      volumeValue.textContent = `${value}%`;
      muteButton.textContent = muted ? "🔇" : volume < .5 ? "🔉" : "🔊";
      muteButton.setAttribute("aria-label", muted ? "Volume muted; adjust volume" : `Adjust volume, ${value} percent`);
      if (muted) {
        [bingoSound, blackoutSound].forEach(audio => {
          audio.pause();
          audio.currentTime = 0;
        });
      }
    }

    muteButton.addEventListener("click", event => {
      event.stopPropagation();
      const isOpen = volumeControl.classList.toggle("open");
      muteButton.setAttribute("aria-expanded", String(isOpen));
      if (isOpen) volumeSlider.focus();
    });
    volumeSlider.addEventListener("input", () => setVolume(volumeSlider.value));
    volumeControl.addEventListener("click", event => event.stopPropagation());
    document.addEventListener("click", () => {
      volumeControl.classList.remove("open");
      muteButton.setAttribute("aria-expanded", "false");
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        volumeControl.classList.remove("open");
        muteButton.setAttribute("aria-expanded", "false");
        muteButton.focus();
      }
    });
    document.querySelector("#fullscreenButton").addEventListener("click", async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    });

    renderBoard(newRandomSeed());
  </script>
</body>
</html>
